<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
 <title id="title">Selected EXOhSPEC results</title>
 <desc id="desc">Four selected measurements: environmental OPL sensitivity, thermal stability, active optics calibration and hybrid control outcome.</desc>
 <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbfdff"/><stop offset="1" stop-color="#edf4f9"/></linearGradient><filter id="sh" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.13"/></filter></defs>
 <rect width="1400" height="720" rx="24" fill="url(#bg)"/>
 <text x="70" y="78" font-family="Arial" font-size="34" font-weight="700" fill="#132f4c">Selected experimental results</text>
 <text x="70" y="113" font-family="Arial" font-size="18" fill="#596f80">Compact indicators from selected stability, calibration and hybrid-control experiments.</text>
 <g filter="url(#sh)"><rect x="70" y="170" width="595" height="210" rx="20" fill="#fff" stroke="#93aac0" stroke-width="2"/><rect x="70" y="170" width="595" height="42" rx="20" fill="#e7f0f8"/><text x="98" y="198" font-family="Arial" font-size="19" font-weight="700" fill="#163c63">Optical-path-length sensitivity</text><text x="105" y="260" font-family="Arial" font-size="44" font-weight="700" fill="#204f78">~0.4 µm / hPa</text><text x="105" y="300" font-family="Arial" font-size="18" fill="#40586a">pressure response</text><text x="405" y="260" font-family="Arial" font-size="44" font-weight="700" fill="#204f78">~6 µm / °C</text><text x="405" y="300" font-family="Arial" font-size="18" fill="#40586a">temperature response</text><text x="105" y="344" font-family="Arial" font-size="15" fill="#647987">Environmental variables were treated jointly during OPL interpretation.</text></g>
 <g filter="url(#sh)"><rect x="735" y="170" width="595" height="210" rx="20" fill="#fff" stroke="#93aac0" stroke-width="2"/><rect x="735" y="170" width="595" height="42" rx="20" fill="#e7f0f8"/><text x="763" y="198" font-family="Arial" font-size="19" font-weight="700" fill="#163c63">Thermal stability benchmark</text><text x="770" y="268" font-family="Arial" font-size="55" font-weight="700" fill="#204f78">σT = 2.47 mK</text><text x="770" y="310" font-family="Arial" font-size="18" fill="#40586a">over a 44.5 h closed-loop run</text><text x="770" y="350" font-family="Arial" font-size="15" fill="#647987">17.4 mK peak-to-peak while the external temperature changed by ~3.2 °C.</text></g>
 <g filter="url(#sh)"><rect x="70" y="445" width="595" height="205" rx="20" fill="#fff" stroke="#7eaa91" stroke-width="2"/><rect x="70" y="445" width="595" height="42" rx="20" fill="#e3f4eb"/><text x="98" y="473" font-family="Arial" font-size="19" font-weight="700" fill="#17674c">Active-optics calibration</text><text x="105" y="535" font-family="Arial" font-size="44" font-weight="700" fill="#167a5b">~0.15 px / step</text><text x="105" y="575" font-family="Arial" font-size="18" fill="#3f6656">centroid response</text><text x="410" y="535" font-family="Arial" font-size="34" font-weight="700" fill="#167a5b">0.443 → 0.153 px</text><text x="410" y="575" font-family="Arial" font-size="18" fill="#3f6656">mean residual after 8 corrections</text></g>
 <g filter="url(#sh)"><rect x="735" y="445" width="595" height="205" rx="20" fill="#fff" stroke="#c99645" stroke-width="2"/><rect x="735" y="445" width="595" height="42" rx="20" fill="#fff1d6"/><text x="763" y="473" font-family="Arial" font-size="19" font-weight="700" fill="#795112">Hybrid TEC + AO result</text><text x="770" y="535" font-family="Arial" font-size="36" font-weight="700" fill="#9b6511">dY RMS: 2.72 → 0.69 px</text><text x="770" y="578" font-family="Arial" font-size="21" fill="#6a4b18">74.5% reduction in the selected comparison interval</text><text x="770" y="618" font-family="Arial" font-size="15" fill="#705d3c">TEC addressed coarse drift; active optics was used as a fine stabiliser.</text></g>
</svg>
