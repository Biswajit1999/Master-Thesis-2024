<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#243b53"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#102a43}.title{font-size:34px;font-weight:700}.sub{font-size:17px;fill:#486581}.box{fill:#ffffff;stroke:#9fb3c8;stroke-width:2}.blue{fill:#e6f6ff;stroke:#4098d7}.orange{fill:#fff4e5;stroke:#f0b429}.green{fill:#e3fcec;stroke:#31a66a}.red{fill:#ffe8e8;stroke:#d64545}.grey{fill:#f0f4f8;stroke:#9fb3c8}.lbl{font-size:18px;font-weight:700}.small{font-size:14px;fill:#334e68}.tiny{font-size:12px;fill:#52606d}.warn{fill:#8a4b08}.ok{fill:#0f6b50}.bad{fill:#9b1c1c}
    </style>
  </defs>
  <rect width="1600" height="980" fill="#f8fbff"/>
  <text x="70" y="65" class="title">EXOhSPEC is not a single textbook PID loop</text>
  <text x="70" y="100" class="sub">The detector image is affected by several delayed thermal and environmental channels, while several outputs must be monitored at once.</text>

  <rect x="70" y="145" width="1460" height="155" rx="22" class="blue"/>
  <text x="95" y="180" class="lbl">A. Textbook single-input/single-output control picture</text>
  <rect x="135" y="215" width="135" height="50" rx="10" class="box"/><text x="165" y="246" class="small">setpoint</text>
  <circle cx="335" cy="240" r="28" fill="#fff" stroke="#4098d7" stroke-width="3"/>
  <text x="328" y="246" font-size="24">Σ</text>
  <rect x="425" y="215" width="175" height="50" rx="10" class="box"/><text x="460" y="246" class="small">PID controller</text>
  <rect x="700" y="215" width="160" height="50" rx="10" class="box"/><text x="748" y="246" class="small">plant</text>
  <rect x="970" y="215" width="130" height="50" rx="10" class="box"/><text x="1005" y="246" class="small">output</text>
  <path d="M270 240 L305 240" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M363 240 L425 240" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M600 240 L700 240" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M860 240 L970 240" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1035 265 C1035 305 335 305 335 270" fill="none" stroke="#243b53" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1160" y="227" class="small">Assumptions:</text>
  <text x="1160" y="250" class="tiny">one main actuator, one output, fixed plant, short repeatable delay</text>
  <text x="1160" y="272" class="tiny">This is not the EXOhSPEC operating case.</text>

  <rect x="70" y="340" width="1460" height="560" rx="22" class="orange"/>
  <text x="95" y="378" class="lbl">B. EXOhSPEC distributed thermo-optical control picture</text>
  <text x="95" y="405" class="small">The feedback loop sees coupled thermal, optical and mechanical states rather than one clean plant variable.</text>

  <rect x="115" y="455" width="270" height="250" rx="18" class="red"/>
  <text x="140" y="490" class="lbl">Disturbance inputs</text>
  <text x="145" y="525" class="small">• camera cooling boundary</text>
  <text x="145" y="552" class="small">• local camera/grating gradients</text>
  <text x="145" y="579" class="small">• pressure and humidity changes</text>
  <text x="145" y="606" class="small">• room/HVAC thermal waves</text>
  <text x="145" y="633" class="small">• OPL/refractive-index drift</text>
  <text x="145" y="660" class="small">• actuator history and lag</text>

  <rect x="500" y="450" width="290" height="255" rx="18" class="box"/>
  <text x="535" y="490" class="lbl">Instrument plant</text>
  <text x="535" y="525" class="small">spectrograph enclosure</text>
  <text x="535" y="552" class="small">air path + opto-mechanics</text>
  <text x="535" y="579" class="small">camera + grating region</text>
  <text x="535" y="606" class="small">multi-minute thermal response</text>
  <text x="535" y="633" class="small">changing coefficients by run</text>

  <rect x="905" y="430" width="280" height="305" rx="18" class="green"/>
  <text x="935" y="468" class="lbl">Measured outputs</text>
  <text x="940" y="505" class="small">• ΔX detector motion</text>
  <text x="940" y="532" class="small">• ΔY detector motion</text>
  <text x="940" y="559" class="small">• radial error r</text>
  <text x="940" y="586" class="small">• optical path length</text>
  <text x="940" y="613" class="small">• TEC temperature</text>
  <text x="940" y="640" class="small">• BME/ECU T, P, RH</text>
  <text x="940" y="667" class="small">• AO cumulative travel</text>
  <text x="940" y="700" class="tiny">More than one output must be watched.</text>

  <rect x="1255" y="455" width="230" height="245" rx="18" class="blue"/>
  <text x="1280" y="490" class="lbl">Controllers</text>
  <text x="1285" y="525" class="small">TEC: slow coarse action</text>
  <text x="1285" y="552" class="small">AO: fast fine trim</text>
  <text x="1285" y="579" class="small">reference management</text>
  <text x="1285" y="606" class="small">model/adaptive terms</text>
  <text x="1285" y="633" class="tiny">Goal: maximise time inside a</text>
  <text x="1285" y="653" class="tiny">narrow detector-error band.</text>

  <path d="M385 580 L500 580" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M790 580 L905 580" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1185 580 L1255 580" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1370 700 C1370 835 620 835 620 705" fill="none" stroke="#243b53" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="700" y="818" class="small">feedback action is delayed and acts through the thermal plant, not directly on ΔY</text>

  <rect x="115" y="745" width="355" height="105" rx="16" class="grey"/>
  <text x="140" y="780" class="lbl">Consequence for interpretation</text>
  <text x="140" y="812" class="small">A non-flat response does not mean feedback failed.</text>
  <text x="140" y="837" class="small">It means the controller is rejecting ongoing disturbances.</text>

  <rect x="990" y="775" width="495" height="75" rx="16" class="grey"/>
  <text x="1015" y="808" class="small">Public report focuses on derived metrics; raw telemetry, component geometry and</text>
  <text x="1015" y="833" class="small">operational control settings remain outside the public release.</text>
</svg>