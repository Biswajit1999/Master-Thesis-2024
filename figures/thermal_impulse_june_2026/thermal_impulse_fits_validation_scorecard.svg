<text x="100" y="832" font-size="17" fill="#4f3e1d">Camera mount A is the strongest OPL candidate, but Camera mount B and Grating B provide the cleanest independently validated rigid image motion. Grating A remains the largest MaxIm centroid-response candidate but needs repeat calibration.</text>
