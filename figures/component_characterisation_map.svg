<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
<title id="title">EXOhSPEC component characterisation map</title>
<desc id="desc">Public research overview showing environmental and optical disturbances, component-level experiments, measured observables and the resulting control roles.</desc>
<defs>
 <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbfdff"/><stop offset="1" stop-color="#edf4f8"/></linearGradient>
 <filter id="sh" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.13"/></filter>
 <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#315f88"/></marker>
</defs>
<rect width="1500" height="920" rx="28" fill="url(#bg)"/>
<text x="70" y="72" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#132f4c">EXOhSPEC component studies: from disturbance to control decision</text>
<text x="70" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5c7180">Public overview of what each module contributes and how it was characterised. Detailed geometry, settings and calibration constants are intentionally omitted.</text>

<g filter="url(#sh)"><rect x="70" y="170" width="260" height="500" rx="20" fill="#fff" stroke="#a7b9c8" stroke-width="2"/><rect x="70" y="170" width="260" height="42" rx="20" fill="#e8f0f8"/><text x="100" y="199" font-family="Arial" font-size="18" font-weight="700" fill="#173e63">Disturbances</text>
<text x="102" y="258" font-family="Arial" font-size="18" fill="#29485f">Ambient temperature</text><text x="102" y="301" font-family="Arial" font-size="18" fill="#29485f">Pressure and humidity</text><text x="102" y="344" font-family="Arial" font-size="18" fill="#29485f">Thermal gradients</text><text x="102" y="387" font-family="Arial" font-size="18" fill="#29485f">Mechanical / optical events</text><text x="102" y="430" font-family="Arial" font-size="18" fill="#29485f">Detector-plane drift</text>
<text x="102" y="505" font-family="Arial" font-size="15" fill="#617989">They change refractive index,</text><text x="102" y="529" font-family="Arial" font-size="15" fill="#617989">optical path and centroid position.</text></g>

<g filter="url(#sh)"><rect x="440" y="150" width="420" height="565" rx="20" fill="#fff" stroke="#8faac0" stroke-width="2"/><rect x="440" y="150" width="420" height="42" rx="20" fill="#e7f0f8"/><text x="468" y="179" font-family="Arial" font-size="18" font-weight="700" fill="#173e63">Component-characterisation studies</text>
<rect x="470" y="220" width="360" height="68" rx="12" fill="#f7fbfe" stroke="#9cb7cc"/><text x="492" y="248" font-family="Arial" font-size="17" font-weight="700" fill="#204968">IDS3010 + glass-slip perturbation</text><text x="492" y="272" font-family="Arial" font-size="14" fill="#526978">Optical-path sensitivity and discontinuity diagnosis</text>
<rect x="470" y="310" width="360" height="68" rx="12" fill="#f7fbfe" stroke="#9cb7cc"/><text x="492" y="338" font-family="Arial" font-size="17" font-weight="700" fill="#204968">BME680 environmental monitoring</text><text x="492" y="362" font-family="Arial" font-size="14" fill="#526978">Local T, P and RH trends near the optical system</text>
<rect x="470" y="400" width="360" height="68" rx="12" fill="#f7fbfe" stroke="#9cb7cc"/><text x="492" y="428" font-family="Arial" font-size="17" font-weight="700" fill="#204968">PT104 four-region thermal mapping</text><text x="492" y="452" font-family="Arial" font-size="14" fill="#526978">Spatial gradients rather than one-point temperature</text>
<rect x="470" y="490" width="360" height="68" rx="12" fill="#f7fbfe" stroke="#9cb7cc"/><text x="492" y="518" font-family="Arial" font-size="17" font-weight="700" fill="#204968">AO step and return calibration</text><text x="492" y="542" font-family="Arial" font-size="14" fill="#526978">Centroid response, direction and finite travel</text>
<rect x="470" y="580" width="360" height="68" rx="12" fill="#f7fbfe" stroke="#9cb7cc"/><text x="492" y="608" font-family="Arial" font-size="17" font-weight="700" fill="#204968">MaxIm DL centroid validation</text><text x="492" y="632" font-family="Arial" font-size="14" fill="#526978">Reference-relative dX and dY measurement</text></g>

<g filter="url(#sh)"><rect x="970" y="170" width="460" height="500" rx="20" fill="#fff" stroke="#77a48d" stroke-width="2"/><rect x="970" y="170" width="460" height="42" rx="20" fill="#e1f4ea"/><text x="998" y="199" font-family="Arial" font-size="18" font-weight="700" fill="#17674c">Control-relevant quantities</text>
<text x="1002" y="258" font-family="Arial" font-size="18" fill="#315d4a">OPL and OPL rate</text><text x="1002" y="301" font-family="Arial" font-size="18" fill="#315d4a">T, P, RH and spatial ΔT</text><text x="1002" y="344" font-family="Arial" font-size="18" fill="#315d4a">dX, dY and radial error</text><text x="1002" y="387" font-family="Arial" font-size="18" fill="#315d4a">AO cumulative travel</text><text x="1002" y="430" font-family="Arial" font-size="18" fill="#315d4a">Data-quality / reference state</text>
<line x1="1002" y1="475" x2="1380" y2="475" stroke="#b4d4c1" stroke-width="2"/>
<text x="1002" y="516" font-family="Arial" font-size="17" font-weight="700" fill="#17674c">Resulting hierarchy</text><text x="1002" y="550" font-family="Arial" font-size="16" fill="#315d4a">1. Detect disturbance and validate data</text><text x="1002" y="579" font-family="Arial" font-size="16" fill="#315d4a">2. TEC handles slow / coarse drift</text><text x="1002" y="608" font-family="Arial" font-size="16" fill="#315d4a">3. AO trims small residual image error</text><text x="1002" y="637" font-family="Arial" font-size="16" fill="#315d4a">4. Preserve range and log evidence</text></g>

<path d="M330 420 H430" fill="none" stroke="#315f88" stroke-width="4" marker-end="url(#arr)"/><path d="M860 420 H960" fill="none" stroke="#315f88" stroke-width="4" marker-end="url(#arr)"/>
<text x="70" y="850" font-family="Arial" font-size="14" fill="#617989">Public scope: the scientific purpose, validation experiment and control role are documented. Hardware addresses, full geometry, calibration matrices, gains, command thresholds, raw telemetry and operational scripts remain private.</text>
</svg>