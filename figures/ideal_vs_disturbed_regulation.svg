<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
<title id="title">Ideal setpoint regulation compared with EXOhSPEC disturbance rejection</title>
<desc id="desc">A conceptual comparison. The upper panel shows ideal stationary zero-error regulation. The lower panel shows a real delayed, multi-disturbance spectrograph control problem with temperature, pressure, humidity, thermal lag and AO limits.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fbfdff"/><stop offset="1" stop-color="#edf4f8"/></linearGradient>
  <filter id="sh" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.13"/></filter>
</defs>
<rect width="1500" height="920" rx="28" fill="url(#bg)"/>
<text x="70" y="72" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#132f4c">Why textbook PID settling is not the correct expectation for EXOhSPEC</text>
<text x="70" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5c7180">Conceptual schematic: the upper trace is an ideal stationary step-response problem; the lower trace represents a delayed, disturbed multi-sensor instrument-control problem.</text>

<g filter="url(#sh)"><rect x="70" y="155" width="1360" height="285" rx="22" fill="#ffffff" stroke="#8faac0" stroke-width="2"/>
<rect x="70" y="155" width="1360" height="42" rx="22" fill="#e7f0f8"/>
<text x="98" y="184" font-family="Arial" font-size="19" font-weight="700" fill="#173e63">A. Ideal stationary setpoint regulation</text>
<line x1="150" y1="360" x2="1310" y2="360" stroke="#60798b" stroke-width="2"/>
<line x1="150" y1="235" x2="150" y2="390" stroke="#60798b" stroke-width="2"/>
<text x="137" y="245" text-anchor="end" font-family="Arial" font-size="15" fill="#60798b">+error</text>
<text x="137" y="365" text-anchor="end" font-family="Arial" font-size="15" fill="#60798b">0</text>
<text x="137" y="389" text-anchor="end" font-family="Arial" font-size="15" fill="#60798b">-error</text>
<path d="M150 360 C215 360, 235 240, 300 286 C350 322, 365 391, 420 367 C470 346, 480 330, 530 358 C610 372, 660 360, 1310 360" fill="none" stroke="#2d6f9e" stroke-width="5"/>
<line x1="150" y1="360" x2="1310" y2="360" stroke="#23a06b" stroke-width="3" stroke-dasharray="10 8"/>
<text x="978" y="346" font-family="Arial" font-size="16" fill="#17674c">target error = 0</text>
<text x="220" y="235" font-family="Arial" font-size="16" fill="#2d6f9e">single clean disturbance / step</text>
<text x="860" y="405" font-family="Arial" font-size="16" fill="#42596a">finite overshoot, then stable settling</text>
<text x="920" y="235" font-family="Arial" font-size="16" fill="#42596a">assumptions: fixed plant, short delay, one dominant actuator</text>
</g>

<g filter="url(#sh)"><rect x="70" y="490" width="1360" height="360" rx="22" fill="#ffffff" stroke="#c69a54" stroke-width="2"/>
<rect x="70" y="490" width="1360" height="42" rx="22" fill="#fff0d8"/>
<text x="98" y="519" font-family="Arial" font-size="19" font-weight="700" fill="#795112">B. EXOhSPEC: disturbance rejection with changing plant conditions</text>
<line x1="150" y1="745" x2="1310" y2="745" stroke="#60798b" stroke-width="2"/>
<line x1="150" y1="575" x2="150" y2="785" stroke="#60798b" stroke-width="2"/>
<line x1="150" y1="745" x2="1310" y2="745" stroke="#23a06b" stroke-width="3" stroke-dasharray="10 8"/>
<text x="137" y="585" text-anchor="end" font-family="Arial" font-size="15" fill="#60798b">+dY</text>
<text x="137" y="750" text-anchor="end" font-family="Arial" font-size="15" fill="#60798b">0</text>
<text x="137" y="779" text-anchor="end" font-family="Arial" font-size="15" fill="#60798b">-dY</text>
<path d="M150 745 C210 708, 238 649, 300 672 C345 688, 385 778, 445 758 C500 740, 515 655, 575 665 C625 674, 668 730, 715 722 C760 714, 795 624, 850 648 C900 670, 930 798, 990 782 C1040 768, 1070 684, 1125 704 C1175 723, 1200 760, 1260 742 C1280 735, 1295 739, 1310 744" fill="none" stroke="#b25f31" stroke-width="5"/>
<path d="M295 606 L295 695" stroke="#8c3f23" stroke-width="2" stroke-dasharray="6 6"/><text x="250" y="594" font-family="Arial" font-size="15" fill="#8c3f23">HVAC / thermal disturbance</text>
<path d="M570 606 L570 695" stroke="#8c3f23" stroke-width="2" stroke-dasharray="6 6"/><text x="510" y="594" font-family="Arial" font-size="15" fill="#8c3f23">pressure / humidity change</text>
<path d="M850 606 L850 695" stroke="#8c3f23" stroke-width="2" stroke-dasharray="6 6"/><text x="805" y="594" font-family="Arial" font-size="15" fill="#8c3f23">delayed TEC response</text>
<path d="M985 806 L985 750" stroke="#17674c" stroke-width="2" stroke-dasharray="6 6"/><text x="940" y="830" font-family="Arial" font-size="15" fill="#17674c">AO fine correction</text>
<text x="220" y="812" font-family="Arial" font-size="16" fill="#42596a">actual objective: maximise time inside a narrow band around zero while rejecting ongoing disturbances</text>

<g><rect x="940" y="550" width="350" height="120" rx="16" fill="#fffaf0" stroke="#c69a54" stroke-width="1.5"/><text x="965" y="580" font-family="Arial" font-size="16" font-weight="700" fill="#795112">Why a perfectly flat trace is difficult</text><text x="965" y="610" font-family="Arial" font-size="15" fill="#5e4e2d">• multiple disturbance channels: T, P, RH, gradients</text><text x="965" y="634" font-family="Arial" font-size="15" fill="#5e4e2d">• slow thermal actuator and finite AO travel</text><text x="965" y="658" font-family="Arial" font-size="15" fill="#5e4e2d">• model sensitivity and reference bias can change by run</text></g>
</g>
<text x="70" y="890" font-family="Arial" font-size="14" fill="#617989">This is a conceptual control interpretation, not a measured time series. Measured performance is reported separately using RMS, bias, settling/recovery windows and threshold residence time.</text>
</svg>