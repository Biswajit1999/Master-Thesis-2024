<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">EXOhSPEC feedback architecture</title>
  <desc id="desc">Environmental and optical telemetry feed a control decision layer. The TEC performs primary thermal correction and active optics performs fine centroid trim.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f7fafc"/><stop offset="1" stop-color="#edf3f8"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.14"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#355b85"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#167a5b"/></marker>
  </defs>
  <rect width="1400" height="760" rx="24" fill="url(#bg)"/>
  <text x="72" y="78" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#132f4c">EXOhSPEC closed-loop stability architecture</text>
  <text x="72" y="114" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#536779">Environmental sensing and OPL monitoring inform a TEC-primary, active-optics fine-trim control hierarchy.</text>
  <g filter="url(#shadow)"><rect x="70" y="175" width="270" height="130" rx="18" fill="#ffffff" stroke="#9ab3cb" stroke-width="2"/><rect x="70" y="175" width="270" height="36" rx="18" fill="#e8f0f8"/><text x="96" y="200" font-family="Arial" font-size="18" font-weight="700" fill="#163c63">Environmental telemetry</text><text x="96" y="239" font-family="Arial" font-size="16" fill="#29485f">BME / ECU</text><text x="96" y="265" font-family="Arial" font-size="16" fill="#29485f">Temperature · pressure · humidity</text></g>
  <g filter="url(#shadow)"><rect x="70" y="425" width="270" height="130" rx="18" fill="#ffffff" stroke="#9ab3cb" stroke-width="2"/><rect x="70" y="425" width="270" height="36" rx="18" fill="#e8f0f8"/><text x="96" y="450" font-family="Arial" font-size="18" font-weight="700" fill="#163c63">Optical measurements</text><text x="96" y="489" font-family="Arial" font-size="16" fill="#29485f">IDS3010 interferometer</text><text x="96" y="515" font-family="Arial" font-size="16" fill="#29485f">Optical path length, ΔOPL</text></g>
  <g filter="url(#shadow)"><rect x="415" y="300" width="280" height="158" rx="18" fill="#ffffff" stroke="#6a8fb5" stroke-width="2.5"/><rect x="415" y="300" width="280" height="42" rx="18" fill="#dfeefa"/><text x="442" y="328" font-family="Arial" font-size="20" font-weight="700" fill="#163c63">Measurement fusion</text><text x="442" y="370" font-family="Arial" font-size="16" fill="#29485f">Time alignment and quality checks</text><text x="442" y="398" font-family="Arial" font-size="16" fill="#29485f">ΔOPL, dX, dY and environment</text><text x="442" y="426" font-family="Arial" font-size="16" fill="#29485f">Reference-relative drift</text></g>
  <g filter="url(#shadow)"><rect x="780" y="270" width="300" height="215" rx="18" fill="#ffffff" stroke="#315f88" stroke-width="3"/><rect x="780" y="270" width="300" height="44" rx="18" fill="#d3e6f7"/><text x="807" y="300" font-family="Arial" font-size="20" font-weight="700" fill="#153d65">Control decision layer</text><text x="807" y="346" font-family="Arial" font-size="16" font-weight="700" fill="#1b5f8c">1. TEC primary correction</text><text x="807" y="375" font-family="Arial" font-size="16" fill="#29485f">Coarse, slow drift and AO unloading</text><text x="807" y="414" font-family="Arial" font-size="16" font-weight="700" fill="#167a5b">2. AO fine trim</text><text x="807" y="443" font-family="Arial" font-size="16" fill="#29485f">Small residual centroid correction</text></g>
  <g filter="url(#shadow)"><rect x="1150" y="170" width="190" height="135" rx="18" fill="#ffffff" stroke="#73a98e" stroke-width="2.5"/><rect x="1150" y="170" width="190" height="38" rx="18" fill="#e0f4ea"/><text x="1175" y="197" font-family="Arial" font-size="18" font-weight="700" fill="#17674c">TEC controller</text><text x="1175" y="239" font-family="Arial" font-size="16" fill="#295443">Thermal setpoint</text><text x="1175" y="266" font-family="Arial" font-size="16" fill="#295443">and PID loop</text></g>
  <g filter="url(#shadow)"><rect x="1150" y="450" width="190" height="135" rx="18" fill="#ffffff" stroke="#73a98e" stroke-width="2.5"/><rect x="1150" y="450" width="190" height="38" rx="18" fill="#e0f4ea"/><text x="1175" y="477" font-family="Arial" font-size="18" font-weight="700" fill="#17674c">Active optics</text><text x="1175" y="519" font-family="Arial" font-size="16" fill="#295443">Bounded tip-tilt</text><text x="1175" y="546" font-family="Arial" font-size="16" fill="#295443">fine correction</text></g>
  <g filter="url(#shadow)"><rect x="750" y="590" width="300" height="105" rx="18" fill="#ffffff" stroke="#d0a35b" stroke-width="2.5"/><rect x="750" y="590" width="300" height="36" rx="18" fill="#fff0d4"/><text x="777" y="615" font-family="Arial" font-size="18" font-weight="700" fill="#795112">Image-plane verification</text><text x="777" y="656" font-family="Arial" font-size="16" fill="#5f4b25">MaxIm DL centroid: dX, dY</text></g>
  <path d="M340 240 H405 V330" fill="none" stroke="#355b85" stroke-width="4" marker-end="url(#arrow)"/><path d="M340 490 H390 V430" fill="none" stroke="#355b85" stroke-width="4" marker-end="url(#arrow)"/><path d="M695 378 H770" fill="none" stroke="#355b85" stroke-width="4" marker-end="url(#arrow)"/><path d="M1080 330 H1140 V240" fill="none" stroke="#167a5b" stroke-width="4" marker-end="url(#arrowGreen)"/><path d="M1080 430 H1140 V515" fill="none" stroke="#167a5b" stroke-width="4" marker-end="url(#arrowGreen)"/><path d="M1245 305 V390 H900 V580" fill="none" stroke="#355b85" stroke-width="3.5" marker-end="url(#arrow)"/><path d="M1245 450 V390" fill="none" stroke="#355b85" stroke-width="3.5"/><path d="M750 642 H620 V458" fill="none" stroke="#355b85" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="72" y="720" font-family="Arial" font-size="15" fill="#607788">Control objective: reduce detector-plane drift while retaining auditable telemetry, actuator limits and response-time awareness.</text>
</svg>
