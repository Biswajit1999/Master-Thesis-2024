name: Import approved thesis material

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Import files
        shell: bash
        env:
          ARTIFACT_URL: 'https://sdmntprnortheu.oaiusercontent.com/files/00000000-97f4-71f4-9957-9d1876f30eb4/raw?se=2026-06-23T16:36:19Z&sp=r&sv=2026-02-06&sr=b&scid=5b33bc35-f578-5f1d-8895-3bbf327f3502&skoid=56822d8b-6cfd-42ed-a00d-1452dca42036&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-06-23T05:42:44Z&ske=2026-06-25T05:42:44Z&sks=b&skv=2026-02-06&sig=fuF20mMszLmpmbjEv3fe0no0KK1eXt9I3b3dLPFiHp4%3D'
        run: |
          set -euo pipefail
          if [ -f 'Poster Presentation and Seminar/Seminar1-State of Art_ Radial Velocity Spectrograph.pdf' ]; then
            exit 0
          fi
          curl -L --fail "$ARTIFACT_URL" -o /tmp/material.zip
          unzip -q /tmp/material.zip -d /tmp/material
          cp -R /tmp/material/export/Master\ Thesies .
          cp -R /tmp/material/export/Poster\ Presentation\ and\ Seminar .
          cat >> README.md <<'EOF'

## Thesis and seminars

- [MSc thesis](Master%20Thesies/Biswajit%20Jana%20Master%20Thesies.pdf)
- [State of Art: Radial Velocity Spectrograph](Poster%20Presentation%20and%20Seminar/Seminar1-State%20of%20Art_%20Radial%20Velocity%20Spectrograph.pdf)
- [Advancements in Precision: LASER Interferometer Control System](Poster%20Presentation%20and%20Seminar/Seminar%202%20-%20Advancements%20in%20Precision_LASER%20Interferometer%20Control%20Systempdf.pdf)
- [Optimizing Path Length Stability in Laser Interferometers using Air Refractive Index](Poster%20Presentation%20and%20Seminar/Seminar%203%20-%20Optimizing%20Path%20Length%20Stability%20in%20Laser%20Interferometers%20using%20Air%20Refractive%20Index.pdf)
- [High-Resolution RV Spectrographs: ANDES and PID Loop Implementation in EXOhSPEC](Poster%20Presentation%20and%20Seminar/Seminar%204%20-High-Resolution%20RV%20Spectrographs_ANDES%20and%20PID%20Loop%20Implementation%20in%20EXOhSPEC%20.pdf)
EOF
          git config user.name 'Biswajit Jana'
          git config user.email 'biswajitj998@gmail.com'
          git add README.md 'Master Thesies' 'Poster Presentation and Seminar'
          git commit -m 'Restore approved MSc thesis and seminar material'
          git push origin HEAD:${{ github.head_ref }}
